---
name: config check
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
env:
  GOTOOLCHAIN: local
jobs:
  config-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
    - name: Config check
      run: |
        V=$(sed -n 's/^version: *//p' librarian.yaml)
        go run github.com/googleapis/librarian/tool/cmd/configcheck@${V} .
